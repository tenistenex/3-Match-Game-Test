# Simple workflow for deploying the static Match-3 game to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html match3.html .nojekyll dist/
          cp -R assets dist/
          test -s dist/index.html
          test -s dist/assets/match3.css
          test -s dist/assets/match3/config/block-types.js
          test -s dist/assets/match3/core/logic.js
          test -s dist/assets/match3/state/game-state.js
          test -s dist/assets/match3/ui/render.js
          test -s dist/assets/match3/systems/battle.js
          test -s dist/assets/match3/main.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
