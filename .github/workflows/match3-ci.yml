name: Match-3 CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Validate game scripts and UI smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Match-3 script syntax
        run: |
          node --check assets/match3/config/block-types.js
          node --check assets/match3/core/logic.js
          node --check assets/match3/state/game-state.js
          node --check assets/match3/ui/render.js
          node --check assets/match3/systems/battle.js
          node --check assets/match3/main.js

      - name: Run Match-3 UI regression tests
        run: node test/match3.test.js
