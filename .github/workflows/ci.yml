name: Match-3 CI

on:
  push:
    branches:
      - main
      - master
      - work
  pull_request:
    branches:
      - main
      - master
      - work

jobs:
  test:
    name: Test match-3 demo
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run tests
        run: node --test

      - name: Check whitespace
        run: git diff --check
